name: Fetch Live News

on:
  # Run every 3 hours
  schedule:
    - cron: "0 */3 * * *"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  # Also run on push to main (so first deploy gets fresh data)
  push:
    branches: [main]
    paths:
      - "fetch-news.js"

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest news from Google News RSS
        run: node fetch-news.js

      - name: Check if news data changed
        id: check_changes
        run: |
          git diff --quiet live-news.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated news
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live-news.json
          git commit -m "🔄 Auto-update live news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0 || sleep 5
          done
          echo "Push failed after 3 attempts" && exit 1
